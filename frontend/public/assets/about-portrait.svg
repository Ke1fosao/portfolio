<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" role="img" aria-labelledby="title desc">
  <title id="title">Абстрактний портретний плейсхолдер</title>
  <desc id="desc">Світла редакційна композиція з абстрактною людською фігурою, монограмою DK та елементами цифрового інтерфейсу.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#bdb8af"/>
      <stop offset=".48" stop-color="#9d978d"/>
      <stop offset="1" stop-color="#716d67"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ede9df"/>
      <stop offset="1" stop-color="#cfc9be"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2=".9" y2="1">
      <stop offset="0" stop-color="#d7b59c"/>
      <stop offset="1" stop-color="#a87c65"/>
    </linearGradient>
    <radialGradient id="light" cx="50%" cy="35%" r="58%">
      <stop offset="0" stop-color="#fff" stop-opacity=".42"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#332f2b" flood-opacity=".22"/>
    </filter>
    <filter id="blur"><feGaussianBlur stdDeviation="46"/></filter>
  </defs>

  <rect width="1200" height="1500" fill="url(#background)"/>
  <rect width="1200" height="1500" fill="url(#light)"/>
  <circle cx="1040" cy="120" r="260" fill="#d8ff80" opacity=".34" filter="url(#blur)"/>
  <circle cx="130" cy="1270" r="290" fill="#aebeff" opacity=".27" filter="url(#blur)"/>

  <g opacity=".18" stroke="#f8f6f1" stroke-width="1">
    <path d="M150 0v1500M300 0v1500M450 0v1500M600 0v1500M750 0v1500M900 0v1500M1050 0v1500"/>
    <path d="M0 150h1200M0 300h1200M0 450h1200M0 600h1200M0 750h1200M0 900h1200M0 1050h1200M0 1200h1200M0 1350h1200"/>
  </g>

  <g filter="url(#softShadow)">
    <path d="M180 1500v-180c0-254 168-420 420-420s420 166 420 420v180z" fill="url(#shirt)"/>
    <path d="M445 900c30 72 78 108 155 108 78 0 126-36 155-108l-14-176H459z" fill="url(#skin)"/>
    <ellipse cx="600" cy="570" rx="226" ry="292" fill="url(#skin)"/>
    <path d="M383 536c-7-188 89-327 230-327 153 0 245 125 222 329-33-57-75-105-132-136-76 70-179 105-304 106z" fill="#2f2b28"/>
    <path d="M407 471c24-145 112-235 221-235 94 0 167 59 205 158-76-58-164-74-260-47-61 17-116 58-166 124z" fill="#39332f"/>
    <ellipse cx="504" cy="571" rx="18" ry="12" fill="#272421" opacity=".84"/>
    <ellipse cx="696" cy="571" rx="18" ry="12" fill="#272421" opacity=".84"/>
    <path d="M575 696c20 15 51 15 72 0" fill="none" stroke="#6f493d" stroke-width="11" stroke-linecap="round" opacity=".7"/>
    <path d="M600 590c-8 34-10 67-5 99" fill="none" stroke="#8d6151" stroke-width="9" stroke-linecap="round" opacity=".6"/>
  </g>

  <g fill="none" stroke="#f8f6f1" opacity=".72">
    <circle cx="600" cy="570" r="350" stroke-dasharray="4 20"/>
    <circle cx="600" cy="570" r="385" opacity=".32"/>
  </g>

  <g transform="translate(68 72)">
    <rect width="238" height="66" rx="33" fill="#f7f5ef" fill-opacity=".88"/>
    <circle cx="35" cy="33" r="7" fill="#55c975"/>
    <text x="56" y="39" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#171614">OPEN TO PROJECTS</text>
  </g>
</svg>
