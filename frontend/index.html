<!doctype html>
<html lang="uk" class="app-booting">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f3f0e8" />
    <meta name="google-site-verification" content="%VITE_GOOGLE_SITE_VERIFICATION%" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Ковтунович Дмитро — Full-stack developer" />
    <meta property="og:description" content="Сайти, вебсистеми та AI-автоматизація для бізнесу." />
    <meta property="og:image" content="/assets/og-image.png" />
    <meta property="og:url" content="%VITE_SITE_URL%/" />
    <meta property="og:site_name" content="Ковтунович Дмитро — Full-stack developer" />
    <meta property="og:locale" content="uk_UA" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="canonical" href="%VITE_SITE_URL%/" />
    <meta name="description" content="Ковтунович Дмитро — Full-stack developer. Сайти, вебсистеми та AI-автоматизація для бізнесу." />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      html.app-booting,
      body.app-booting {
        overflow: hidden;
        background: #f3f0e8;
      }
      #boot-loader {
        position: fixed;
        z-index: 99999;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 18% 18%, rgba(216, 255, 128, .32), transparent 30%),
          radial-gradient(circle at 82% 70%, rgba(174, 190, 255, .24), transparent 34%),
          linear-gradient(135deg, #f8f6ef 0%, #ece9df 100%);
        color: #151513;
        transition: opacity .42s ease, visibility .42s ease;
      }
      #boot-loader.is-hiding {
        opacity: 0;
        visibility: hidden;
      }
      .boot-card {
        position: relative;
        display: grid;
        gap: 22px;
        width: min(460px, 100%);
        padding: 28px;
        overflow: hidden;
        border: 1px solid rgba(21, 21, 19, .13);
        border-radius: 30px;
        background: rgba(255, 253, 248, .78);
        box-shadow: 0 28px 90px rgba(35, 32, 24, .16);
        backdrop-filter: blur(18px);
      }
      .boot-card::before {
        position: absolute;
        inset: -40% auto auto 46%;
        width: 260px;
        height: 260px;
        border-radius: 50%;
        background: #d8ff80;
        opacity: .42;
        filter: blur(5px);
        content: "";
      }
      .boot-mark {
        position: relative;
        display: grid;
        place-items: center;
        width: 58px;
        height: 58px;
        border-radius: 18px;
        background: #151513;
        color: #d8ff80;
        font: 900 20px/1 Manrope, Arial, sans-serif;
        letter-spacing: -.07em;
        box-shadow: 0 16px 32px rgba(21, 21, 19, .18);
      }
      .boot-copy {
        position: relative;
        display: grid;
        gap: 8px;
      }
      .boot-copy small {
        color: #64833a;
        font: 900 10px/1.2 Manrope, Arial, sans-serif;
        letter-spacing: .16em;
        text-transform: uppercase;
      }
      .boot-copy strong {
        max-width: 340px;
        font: 800 clamp(31px, 8vw, 48px)/.92 Manrope, Arial, sans-serif;
        letter-spacing: -.07em;
      }
      .boot-progress {
        position: relative;
        overflow: hidden;
        height: 9px;
        border-radius: 999px;
        background: rgba(21, 21, 19, .08);
      }
      .boot-progress i {
        position: absolute;
        inset: 0 auto 0 0;
        width: 42%;
        border-radius: inherit;
        background: linear-gradient(90deg, #151513, #d8ff80);
        animation: boot-slide 1.05s cubic-bezier(.65, 0, .2, 1) infinite;
      }
      @keyframes boot-slide {
        0% { transform: translateX(-110%); }
        100% { transform: translateX(260%); }
      }
      @media (prefers-reduced-motion: reduce) {
        .boot-progress i { animation: none; width: 100%; }
        #boot-loader { transition: none; }
      }
    </style>
    <title>Ковтунович Дмитро — Full-stack developer</title>
  </head>
  <body class="app-booting">
    <div id="boot-loader" role="status" aria-live="polite" aria-label="Завантаження сайту">
      <div class="boot-card">
        <div class="boot-mark">DK.</div>
        <div class="boot-copy">
          <small>Portfolio control</small>
          <strong>Готуємо інтерфейс.</strong>
        </div>
        <div class="boot-progress" aria-hidden="true"><i></i></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
